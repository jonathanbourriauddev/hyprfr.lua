# ===========================
# DRACULA WARM — palette centrale
# ===========================

# Fonds
$col_base       = rgba(221a1aff)   # fond principal — noir chaud
$col_mantle     = rgba(1e1515ff)   # fond plus sombre
$col_surface    = rgba(2d2020ff)   # fond des surfaces/fenêtres

# Texte
$col_text       = rgba(f8f8f2ff)   # blanc cassé Dracula
$col_subtext    = rgba(bfbdb6ff)   # texte secondaire

# Accents chauds
$col_primary    = rgba(e0789aff)   # rose-violet chaud (remplace le violet froid)
$col_secondary  = rgba(ffb86cff)   # orange Dracula — conservé
$col_tertiary   = rgba(ff6e6eff)   # rouge-rose

# Couleurs fonctionnelles
$col_green      = rgba(69ff94ff)   # vert Dracula
$col_cyan       = rgba(a4ffffff)   # cyan Dracula
$col_yellow     = rgba(ffffa5ff)   # jaune Dracula

# Bordures
$col_border_active   = rgba(e0789aff)   # rose-violet chaud
$col_border_inactive = rgba(2d2020ff)   # fond surface
