# ===========================
# FONT & LIGATURES
# ===========================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
font_features    JetBrainsMonoNerdFont-Regular +liga +calt
disable_ligatures never

# ===========================
# THEME DRACULA WARM
# ===========================
background            #221a1a
foreground            #f8f8f2
selection_background  #e0789a
selection_foreground  #221a1a

color0  #2d2020
color1  #ff6e6e
color2  #69ff94
color3  #ffffa5
color4  #bd93f9
color5  #e0789a
color6  #a4ffff
color7  #f8f8f2
color8  #44475a
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #bd93f9
color13 #e0789a
color14 #a4ffff
color15 #ffffff

cursor                #e0789a
cursor_text_color     #221a1a

url_color             #ffb86c

# ===========================
# CURSOR TRAIL
# ===========================
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
cursor_trail          1
cursor_trail_decay    0.1 0.4
cursor_trail_start_threshold 2

# ===========================
# TRANSPARENCE & STYLE
# ===========================
background_opacity         0.92
dynamic_background_opacity yes

window_padding_width  12
window_padding_height 8

# ===========================
# SILENCIEUX
# ===========================
enable_audio_bell          no
visual_bell_duration       0.1
visual_bell_color          #e0789a
bell_on_tab                no
confirm_os_window_close    0
close_on_child_death       yes

# ===========================
# COLLAGE MULTI-LIGNES
# ===========================
paste_actions              quote-urls-at-prompt,confirm-if-large
strip_trailing_spaces      smart

# ===========================
# TABS
# ===========================
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #221a1a
active_tab_background   #e0789a
inactive_tab_foreground #bfbdb6
inactive_tab_background #2d2020

# ===========================
# MISC
# ===========================
scrollback_lines         10000
copy_on_select           clipboard
strip_trailing_spaces    smart
